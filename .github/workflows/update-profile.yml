name: Update Kitty Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-svgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests

      - name: Generate Dynamic SVGs
        run: python scripts/generate_svgs.py ${{ secrets.GITHUB_TOKEN }}
        
      - name: Commit changes
        run: |
          git config --global user.name "Amina's Kitty Bot"
          git config --global user.email "actions@github.com"
          git add assets/*
          git commit -m "🎀 Automated profile update" || echo "Nothing to commit"
          git push
