<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="140">
  <!-- Ears -->
  <path d="M60 60 C 50 30, 30 40, 30 60 C 30 80, 50 80, 70 80 Z" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <path d="M140 60 C 150 30, 170 40, 170 60 C 170 80, 150 80, 130 80 Z" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <!-- Head -->
  <path d="M100 40 C 140 40, 170 80, 170 110 C 170 150, 140 170, 100 170 C 60 170, 30 150, 30 110 C 30 80, 60 40, 100 40 Z" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <!-- Bow -->
  <g transform="translate(145, 45) scale(0.8)">
    <path d="M0 0 C -20 -20, -40 -10, -30 15 C -20 40, 0 20, 0 0 Z" fill="#E5253E"/>
    <path d="M0 0 C 20 -20, 40 -10, 30 15 C 20 40, 0 20, 0 0 Z" fill="#E5253E"/>
    <circle cx="0" cy="0" r="7" fill="#AEC6CF"/>
  </g>
  <!-- Eyes -->
  <ellipse cx="75" cy="110" rx="7" ry="11" fill="#000"/>
  <ellipse cx="125" cy="110" rx="7" ry="11" fill="#000"/>
  <!-- Nose -->
  <ellipse cx="100" cy="125" rx="6" ry="4" fill="#FFC20E"/>
  <!-- Whiskers -->
  <line x1="60" y1="120" x2="20" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="130" x2="20" y2="130" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="140" x2="20" y2="150" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="120" x2="180" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="130" x2="180" y2="130" stroke="#000" stroke-width="2"/>
  <line x1="140" y1="140" x2="180" y2="150" stroke="#000" stroke-width="2"/>
</svg>
