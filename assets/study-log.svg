<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500">
  <!-- Clipboard Body -->
  <rect x="40" y="20" width="420" height="210" rx="15" fill="#FFF8DC" stroke="#E5253E" stroke-width="4"/>
  <!-- Clip -->
  <rect x="200" y="10" width="100" height="30" rx="5" fill="#E5253E"/>
  <circle cx="250" cy="25" r="8" fill="#AEC6CF"/>
  
  <text x="250" y="80" font-family="Poppins, sans-serif" font-size="24" font-weight="bold" fill="#E5253E" text-anchor="middle">CURRENTLY LEARNING 📚</text>
  
  <!-- Checklist -->
  <g font-family="monospace" font-size="18" fill="#4A4A4A">
    <rect x="70" y="110" width="20" height="20" rx="4" fill="#FFB6C1"/>
    <path d="M74 120 L 78 124 L 86 114" stroke="#E5253E" stroke-width="3" fill="none"/>
    <text x="100" y="126">Neural Networks</text>
    
    <rect x="70" y="145" width="20" height="20" rx="4" fill="#FFB6C1"/>
    <path d="M74 155 L 78 159 L 86 149" stroke="#E5253E" stroke-width="3" fill="none"/>
    <text x="100" y="161">Data Structures</text>
    
    <rect x="70" y="180" width="20" height="20" rx="4" fill="#FFB6C1" stroke="#E5253E" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="100" y="196">Advanced Algorithms</text>
  </g>
  
  <!-- Bow Accent -->
  <g transform="translate(400, 150)">
    <path d="M0 0 C -15 -15, -30 -5, -25 10 C -20 25, 0 15, 0 0 Z" fill="#E5253E"/>
    <path d="M0 0 C 15 -15, 30 -5, 25 10 C 20 25, 0 15, 0 0 Z" fill="#E5253E"/>
    <circle cx="0" cy="0" r="5" fill="#FFB6C1"/>
  </g>
</svg>
