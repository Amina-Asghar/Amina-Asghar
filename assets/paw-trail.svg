        </g>
        <g transform="translate(60, 40) scale(0.5)">
          <circle cx="10" cy="20" r="8" fill="#FFB6C1"/>
          <circle cx="0" cy="10" r="4" fill="#FFB6C1"/>
          <circle cx="20" cy="10" r="4" fill="#FFB6C1"/>
