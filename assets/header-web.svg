<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#FFB6C1"/>
    </pattern>
  </defs>
  <rect width="800" height="200" fill="#FFF8DC"/>
  <rect width="800" height="200" fill="url(#dots)"/>
  <!-- Bow Right -->
  <g transform="translate(650, 50)">
    <path d="M0 0 C -30 -30, -60 -10, -50 20 C -40 50, -10 30, 0 0 Z" fill="#E5253E"/>
    <path d="M0 0 C 30 -30, 60 -10, 50 20 C 40 50, 10 30, 0 0 Z" fill="#E5253E"/>
    <circle cx="0" cy="0" r="10" fill="#FFB6C1"/>
  </g>
  <text x="400" y="100" font-family="Poppins, sans-serif" font-size="48" font-weight="bold" fill="#E5253E" text-anchor="middle">Amina Asghar</text>
  <text x="400" y="140" font-family="Poppins, sans-serif" font-size="20" fill="#4A4A4A" text-anchor="middle">Artificial Intelligence Student // Hello Kitty Enthusiast</text>
  <!-- Wave Pattern -->
  <path d="M0 180 Q 100 150, 200 180 T 400 180 T 600 180 T 800 180 L 800 200 L 0 200 Z" fill="#E5253E"/>
</svg>
